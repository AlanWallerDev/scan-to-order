<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a5fb4">
<title>Scan to Order</title>
<style>
  :root {
    --blue: #1a5fb4;
    --blue-dark: #144a8f;
    --green: #26a269;
    --red: #c01c28;
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #6e6e73;
    --border: #d9dadd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    max-width: 560px;
    margin: 0 auto;
  }
  header {
    background: var(--blue);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex: 0 0 auto;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header button {
    background: rgba(255,255,255,.15);
    border: none;
    color: #fff;
    font-size: 16px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
  }
  main { flex: 1 1 auto; overflow-y: auto; padding: 12px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }
  label.field-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .row { display: flex; gap: 8px; }
  select, input[type=text], input[type=number], input[type=email] {
    width: 100%;
    font-size: 16px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
  }
  button.btn {
    font-size: 16px;
    font-weight: 600;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: var(--blue);
    color: #fff;
    min-height: 48px;
  }
  button.btn.secondary { background: #e5e6ea; color: var(--text); }
  button.btn.green { background: var(--green); }
  button.btn.red { background: var(--red); }
  button.btn.block { width: 100%; }
  button.btn:disabled { opacity: .5; cursor: default; }
  .scan-buttons { display: flex; gap: 8px; margin-top: 10px; }
  .scan-buttons .btn { flex: 1; }
  #itemList { list-style: none; }
  #itemList li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
  }
  #itemList li:last-child { border-bottom: none; }
  .item-code { flex: 1; font-family: ui-monospace, Consolas, monospace; font-size: 15px; word-break: break-all; }
  .item-qty {
    font-weight: 700;
    font-size: 16px;
    background: #eef3fb;
    color: var(--blue-dark);
    border-radius: 8px;
    padding: 6px 12px;
    border: none;
    cursor: pointer;
    min-width: 56px;
  }
  .item-del {
    background: none;
    border: none;
    color: var(--red);
    font-size: 20px;
    padding: 8px;
    cursor: pointer;
  }
  .empty { color: var(--muted); text-align: center; padding: 16px 0; font-size: 14px; }
  footer {
    flex: 0 0 auto;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    background: var(--card);
    border-top: 1px solid var(--border);
  }
  .totals { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 8px; }

  /* modals */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 16px 16px 0 0;
    padding: 16px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 17px; margin-bottom: 12px; }
  .modal .row { margin-top: 12px; }
  .modal .row .btn { flex: 1; }
  .qty-code {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 18px;
    text-align: center;
    background: var(--bg);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 12px;
    word-break: break-all;
  }
  .qty-stepper { display: flex; gap: 8px; align-items: stretch; }
  .qty-stepper button {
    flex: 0 0 64px;
    font-size: 26px;
    border: 1px solid var(--border);
    background: #e5e6ea;
    border-radius: 8px;
    cursor: pointer;
  }
  .qty-stepper input { text-align: center; font-size: 24px; font-weight: 700; }
  .qty-quick { display: flex; gap: 8px; margin-top: 8px; }
  .qty-quick button {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    padding: 12px 0;
    border: 1px solid var(--border);
    background: #e5e6ea;
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
  }
  #exportText {
    width: 100%;
    min-height: 180px;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    white-space: pre;
  }
  .export-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }

  /* settings / format editor */
  #settingsModal input[type=text], #settingsModal input[type=email] { margin-bottom: 10px; font-family: ui-monospace, Consolas, monospace; }
  #settingsModal input[type=email] { font-family: inherit; }
  .fmt-hint { font-size: 12px; color: var(--muted); margin: -6px 0 10px; }
  .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 15px; }
  .check-row input { width: 20px; height: 20px; }
  #fmtPreview {
    width: 100%;
    min-height: 110px;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    background: var(--bg);
    white-space: pre;
    margin-bottom: 10px;
  }
  .fmt-title { font-size: 15px; font-weight: 600; margin: 14px 0 8px; padding-top: 12px; border-top: 1px solid var(--border); }

  /* camera */
  #camModal .modal { padding: 0; background: #000; border-radius: 16px 16px 0 0; overflow: hidden; }
  #camWrap { position: relative; }
  #camVideo { width: 100%; max-height: 60vh; display: block; background: #000; }
  #camReticle {
    position: absolute; inset: 15% 10%;
    border: 2px solid rgba(255,255,255,.8);
    border-radius: 12px;
    pointer-events: none;
  }
  #camStatus {
    color: #fff; text-align: center; padding: 10px; font-size: 14px;
  }
  #camModal .row { padding: 0 12px 16px; }
  .toast {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    z-index: 99;
    display: none;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
</style>
</head>
<body>

<header>
  <h1>Scan to Order</h1>
  <button id="settingsBtn" aria-label="Settings">&#9881; Settings</button>
</header>

<main>
  <div class="card">
    <label class="field-label" for="locSelect">Location</label>
    <div class="row">
      <select id="locSelect"></select>
      <button class="btn secondary" id="addLocBtn" style="flex:0 0 auto">+ New</button>
    </div>
  </div>

  <div class="card">
    <label class="field-label" for="manualInput">Scan barcode (camera) or type / wedge-scan product ID</label>
    <div class="row">
      <input type="text" id="manualInput" inputmode="text" autocomplete="off" placeholder="Product ID">
      <button class="btn secondary" id="manualAddBtn" style="flex:0 0 auto">Add</button>
    </div>
    <div class="scan-buttons">
      <button class="btn" id="camBtn">&#128247; Scan with camera</button>
    </div>
  </div>

  <div class="card">
    <label class="field-label">Items at <span id="locName">—</span></label>
    <ul id="itemList"></ul>
    <div class="empty" id="emptyMsg">No items scanned here yet.</div>
  </div>
</main>

<footer>
  <div class="totals" id="totals"></div>
  <div class="row">
    <button class="btn green block" id="exportBtn">&#9993; Send / Export file</button>
  </div>
</footer>

<div class="toast" id="toast"></div>

<!-- quantity modal -->
<div class="modal-backdrop" id="qtyModal">
  <div class="modal">
    <h2>Quantity to order</h2>
    <div class="qty-code" id="qtyCode"></div>
    <div class="qty-stepper">
      <button id="qtyMinus" aria-label="Decrease">&minus;</button>
      <input type="number" id="qtyInput" min="1" step="1" value="1" inputmode="numeric">
      <button id="qtyPlus" aria-label="Increase">+</button>
    </div>
    <div class="qty-quick">
      <button data-add="5">+5</button>
      <button data-add="10">+10</button>
      <button data-add="100">+100</button>
    </div>
    <div class="row">
      <button class="btn secondary" id="qtyCancel">Cancel</button>
      <button class="btn green" id="qtySave">Save</button>
    </div>
  </div>
</div>

<!-- camera modal -->
<div class="modal-backdrop" id="camModal">
  <div class="modal">
    <div id="camWrap">
      <video id="camVideo" playsinline muted></video>
      <div id="camReticle"></div>
    </div>
    <div id="camStatus">Point the camera at a barcode</div>
    <div class="row">
      <button class="btn secondary block" id="camClose">Close camera</button>
    </div>
  </div>
</div>

<!-- export modal -->
<div class="modal-backdrop" id="exportModal">
  <div class="modal">
    <h2>Order file</h2>
    <textarea id="exportText" readonly></textarea>
    <div class="export-actions">
      <button class="btn" id="shareBtn">&#128228; Share&hellip;</button>
      <button class="btn" id="emailBtn">&#9993; Email</button>
      <button class="btn secondary" id="downloadBtn">&#8595; Download</button>
      <button class="btn secondary" id="copyBtn">Copy text</button>
    </div>
    <div class="row">
      <button class="btn red" id="clearSentBtn">Sent &mdash; clear all scans</button>
      <button class="btn secondary" id="exportClose">Close</button>
    </div>
  </div>
</div>

<!-- settings modal -->
<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label class="field-label" for="emailInput">Send order files to (email)</label>
    <input type="email" id="emailInput" placeholder="orders@example.com">

    <div class="fmt-title">File format</div>
    <label class="field-label" for="fmtHeader">Header (top of file &mdash; leave blank for none)</label>
    <input type="text" id="fmtHeader" autocomplete="off">
    <div class="fmt-hint">Tokens: {date} {time} {datetime}</div>
    <label class="field-label" for="fmtLocHeader">Location header (leave blank for a flat file)</label>
    <input type="text" id="fmtLocHeader" autocomplete="off">
    <div class="fmt-hint">Tokens: {location} {count} {units}</div>
    <label class="field-label" for="fmtLine">Item line</label>
    <input type="text" id="fmtLine" autocomplete="off">
    <div class="fmt-hint">Tokens: {code} {qty} {location} &mdash; use \t for a tab</div>
    <div class="check-row">
      <input type="checkbox" id="fmtBlank">
      <label for="fmtBlank">Blank line between locations</label>
    </div>
    <label class="field-label">Preview (sample data)</label>
    <textarea id="fmtPreview" readonly></textarea>
    <button class="btn secondary block" id="fmtReset" style="width:100%">Reset format to default</button>

    <div class="row">
      <button class="btn red" id="wipeBtn">Delete all data</button>
      <button class="btn" id="settingsSave">Save</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ---------- state ---------- */
const STORE_KEY = "scanToOrder.v1";
const DEFAULT_FORMAT = {
  header: "# Order scan export {datetime}",
  locHeader: "[{location}]",
  line: "{code},{qty}",
  blankBetween: true
};
let state = { locations: [], scans: {}, currentLoc: "", email: "", format: null };

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch (e) { /* corrupt store — start fresh */ }
  state.format = Object.assign({}, DEFAULT_FORMAT, state.format || {});
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
function toast(msg, ms) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.style.display = "none", ms || 1600);
}
function beep() {
  try {
    const ctx = beep._ctx || (beep._ctx = new (window.AudioContext || window.webkitAudioContext)());
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = 1200; o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .15);
    o.start(); o.stop(ctx.currentTime + .15);
  } catch (e) { /* audio unavailable */ }
}

/* ---------- locations ---------- */
function renderLocations() {
  const sel = $("locSelect");
  sel.innerHTML = "";
  if (state.locations.length === 0) {
    const o = document.createElement("option");
    o.textContent = "— add a location —";
    o.value = "";
    sel.appendChild(o);
  }
  for (const loc of state.locations) {
    const o = document.createElement("option");
    const n = (state.scans[loc] || []).length;
    o.value = loc;
    o.textContent = n ? loc + " (" + n + ")" : loc;
    sel.appendChild(o);
  }
  sel.value = state.currentLoc;
  $("locName").textContent = state.currentLoc || "—";
}

$("addLocBtn").addEventListener("click", () => {
  const name = (prompt("New location name:") || "").trim();
  if (!name) return;
  if (!state.locations.includes(name)) state.locations.push(name);
  state.currentLoc = name;
  save(); renderAll();
});

$("locSelect").addEventListener("change", e => {
  state.currentLoc = e.target.value;
  save(); renderAll();
});

/* ---------- items ---------- */
function itemsHere() {
  if (!state.currentLoc) return [];
  return state.scans[state.currentLoc] || (state.scans[state.currentLoc] = []);
}

function renderItems() {
  const ul = $("itemList");
  ul.innerHTML = "";
  const items = state.currentLoc ? (state.scans[state.currentLoc] || []) : [];
  $("emptyMsg").style.display = items.length ? "none" : "block";
  items.forEach((it, i) => {
    const li = document.createElement("li");
    const code = document.createElement("span");
    code.className = "item-code";
    code.textContent = it.code;
    const qty = document.createElement("button");
    qty.className = "item-qty";
    qty.textContent = "×" + it.qty;
    qty.title = "Edit quantity";
    qty.addEventListener("click", () => openQty(it.code, it.qty));
    const del = document.createElement("button");
    del.className = "item-del";
    del.innerHTML = "&#10005;";
    del.setAttribute("aria-label", "Remove " + it.code);
    del.addEventListener("click", () => {
      items.splice(i, 1);
      save(); renderAll();
    });
    li.append(code, qty, del);
    ul.appendChild(li);
  });

  let locs = 0, lines = 0, units = 0;
  for (const loc of state.locations) {
    const arr = state.scans[loc] || [];
    if (arr.length) { locs++; lines += arr.length; for (const it of arr) units += it.qty; }
  }
  $("totals").textContent = lines
    ? lines + " item" + (lines === 1 ? "" : "s") + " · " + units + " units · " + locs + " location" + (locs === 1 ? "" : "s")
    : "Nothing scanned yet";
  $("exportBtn").disabled = !lines;
}

function renderAll() { renderLocations(); renderItems(); }

/* ---------- quantity modal ---------- */
let qtyTarget = null; // product code being edited

function openQty(code, existingQty) {
  if (!state.currentLoc) { toast("Pick a location first"); return; }
  qtyTarget = code;
  $("qtyCode").textContent = code;
  $("qtyInput").value = existingQty || 1;
  $("qtyModal").classList.add("open");
  setTimeout(() => { $("qtyInput").focus(); $("qtyInput").select(); }, 50);
}
function closeQty() { $("qtyModal").classList.remove("open"); qtyTarget = null; }

$("qtyMinus").addEventListener("click", () => {
  $("qtyInput").value = Math.max(1, (parseInt($("qtyInput").value, 10) || 1) - 1);
});
$("qtyPlus").addEventListener("click", () => {
  $("qtyInput").value = (parseInt($("qtyInput").value, 10) || 0) + 1;
});
document.querySelectorAll(".qty-quick button").forEach(btn => {
  btn.addEventListener("click", () => {
    const add = parseInt(btn.dataset.add, 10);
    $("qtyInput").value = (parseInt($("qtyInput").value, 10) || 0) + add;
  });
});
$("qtyCancel").addEventListener("click", closeQty);
$("qtySave").addEventListener("click", saveQty);
$("qtyInput").addEventListener("keydown", e => { if (e.key === "Enter") saveQty(); });

function saveQty() {
  const qty = parseInt($("qtyInput").value, 10);
  if (!qty || qty < 1) { toast("Enter a quantity of 1 or more"); return; }
  const items = itemsHere();
  const existing = items.find(it => it.code === qtyTarget);
  if (existing) existing.qty = qty;
  else items.push({ code: qtyTarget, qty: qty, ts: new Date().toISOString() });
  save(); renderAll(); closeQty();
  toast("Saved " + qtyTarget + " ×" + qty);
}

/* a captured code (from camera, wedge scanner, or typing) enters here */
function onCode(code) {
  code = (code || "").trim();
  if (!code) return;
  if (!state.currentLoc) { toast("Pick a location first"); return; }
  beep();
  const existing = itemsHere().find(it => it.code === code);
  openQty(code, existing ? existing.qty : 1);
}

$("manualAddBtn").addEventListener("click", () => {
  onCode($("manualInput").value);
  $("manualInput").value = "";
});
$("manualInput").addEventListener("keydown", e => {
  if (e.key === "Enter") { // wedge scanners send Enter after the code
    e.preventDefault();
    onCode($("manualInput").value);
    $("manualInput").value = "";
  }
});

/* ---------- camera scanning ---------- */
let camStream = null, camLoop = null, zxingReader = null, lastHit = { code: "", ts: 0 };

$("camBtn").addEventListener("click", openCamera);
$("camClose").addEventListener("click", closeCamera);

async function openCamera() {
  if (!state.currentLoc) { toast("Pick a location first"); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast("Camera not available in this browser"); return;
  }
  $("camModal").classList.add("open");
  $("camStatus").textContent = "Starting camera…";
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const video = $("camVideo");
    video.srcObject = camStream;
    await video.play();
    $("camStatus").textContent = "Point the camera at a barcode";
    if ("BarcodeDetector" in window) startNativeDetect(video);
    else startZxing(video);
  } catch (err) {
    $("camStatus").textContent = "Camera error: " + err.message;
  }
}

function startNativeDetect(video) {
  const detector = new BarcodeDetector({
    formats: ["code_128", "code_39", "ean_13", "ean_8", "upc_a", "upc_e", "itf", "qr_code", "data_matrix"]
  });
  camLoop = setInterval(async () => {
    if (video.readyState < 2) return;
    try {
      const codes = await detector.detect(video);
      if (codes.length) hit(codes[0].rawValue);
    } catch (e) { /* frame not ready */ }
  }, 250);
}

async function startZxing(video) {
  $("camStatus").textContent = "Loading scanner library…";
  try {
    if (!window.ZXingBrowser) {
      await new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = "https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js";
        s.onload = res; s.onerror = () => rej(new Error("could not load library (offline?)"));
        document.head.appendChild(s);
      });
    }
    zxingReader = new ZXingBrowser.BrowserMultiFormatReader();
    $("camStatus").textContent = "Point the camera at a barcode";
    zxingReader.decodeFromVideoElement(video, result => {
      if (result) hit(result.getText());
    });
  } catch (err) {
    $("camStatus").textContent = "Scanner error: " + err.message;
  }
}

function hit(code) {
  const now = Date.now();
  // ignore repeat reads of the same label for 2.5s
  if (code === lastHit.code && now - lastHit.ts < 2500) return;
  lastHit = { code: code, ts: now };
  closeCamera();
  onCode(code);
}

function closeCamera() {
  $("camModal").classList.remove("open");
  if (camLoop) { clearInterval(camLoop); camLoop = null; }
  if (zxingReader) { try { zxingReader.stopContinuousDecode(); } catch (e) {} zxingReader = null; }
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  $("camVideo").srcObject = null;
}

/* ---------- export ---------- */
/* fill {tokens} in a template, then turn \t and \n escapes into real characters */
function expand(tpl, vars) {
  return tpl
    .replace(/\{(\w+)\}/g, (m, k) => (k in vars ? String(vars[k]) : m))
    .replace(/\\t/g, "\t")
    .replace(/\\n/g, "\r\n");
}

function renderFileText(fmt, locations, scans) {
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  const dateVars = {
    date: now.getFullYear() + "-" + pad(now.getMonth() + 1) + "-" + pad(now.getDate()),
    time: pad(now.getHours()) + ":" + pad(now.getMinutes())
  };
  dateVars.datetime = dateVars.date + " " + dateVars.time;

  const sections = [];
  if (fmt.header.trim()) sections.push(expand(fmt.header, dateVars));
  for (const loc of locations) {
    const items = scans[loc] || [];
    if (!items.length) continue;
    const lines = [];
    if (fmt.locHeader.trim()) {
      let units = 0;
      for (const it of items) units += it.qty;
      lines.push(expand(fmt.locHeader, Object.assign({ location: loc, count: items.length, units: units }, dateVars)));
    }
    for (const it of items) {
      lines.push(expand(fmt.line, Object.assign({ code: it.code, qty: it.qty, location: loc }, dateVars)));
    }
    sections.push(lines.join("\r\n"));
  }
  return sections.join(fmt.blankBetween ? "\r\n\r\n" : "\r\n") + "\r\n";
}

function buildFile() {
  return renderFileText(state.format, state.locations, state.scans);
}
function fileName() {
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  return "order_" + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate())
    + "_" + pad(d.getHours()) + pad(d.getMinutes()) + ".txt";
}

$("exportBtn").addEventListener("click", () => {
  $("exportText").value = buildFile();
  $("exportModal").classList.add("open");
});
$("exportClose").addEventListener("click", () => $("exportModal").classList.remove("open"));

$("shareBtn").addEventListener("click", async () => {
  const text = $("exportText").value;
  const file = new File([text], fileName(), { type: "text/plain" });
  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: "Order scan export" });
    } else if (navigator.share) {
      await navigator.share({ title: "Order scan export", text: text });
    } else {
      toast("Sharing not supported here — use Email or Download");
    }
  } catch (e) { /* user cancelled share sheet */ }
});

$("emailBtn").addEventListener("click", () => {
  const to = encodeURIComponent(state.email || "");
  const subject = encodeURIComponent("Order scan export " + fileName());
  const body = encodeURIComponent($("exportText").value);
  location.href = "mailto:" + to + "?subject=" + subject + "&body=" + body;
});

$("downloadBtn").addEventListener("click", () => {
  const blob = new Blob([$("exportText").value], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = fileName();
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
});

$("copyBtn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText($("exportText").value);
    toast("Copied");
  } catch (e) {
    $("exportText").select();
    document.execCommand("copy");
    toast("Copied");
  }
});

$("clearSentBtn").addEventListener("click", () => {
  if (!confirm("Clear all scanned items? Locations are kept.")) return;
  state.scans = {};
  save(); renderAll();
  $("exportModal").classList.remove("open");
  toast("Scans cleared");
});

/* ---------- settings ---------- */
const SAMPLE_DATA = {
  locations: ["Aisle 3", "Backroom"],
  scans: {
    "Aisle 3": [{ code: "012345678905", qty: 4 }, { code: "44001122", qty: 1 }],
    "Backroom": [{ code: "55009988", qty: 2 }]
  }
};

function formatFromFields() {
  return {
    header: $("fmtHeader").value,
    locHeader: $("fmtLocHeader").value,
    line: $("fmtLine").value,
    blankBetween: $("fmtBlank").checked
  };
}
function fieldsFromFormat(fmt) {
  $("fmtHeader").value = fmt.header;
  $("fmtLocHeader").value = fmt.locHeader;
  $("fmtLine").value = fmt.line;
  $("fmtBlank").checked = fmt.blankBetween;
}
function updateFmtPreview() {
  $("fmtPreview").value = renderFileText(formatFromFields(), SAMPLE_DATA.locations, SAMPLE_DATA.scans);
}
for (const id of ["fmtHeader", "fmtLocHeader", "fmtLine"]) {
  $(id).addEventListener("input", updateFmtPreview);
}
$("fmtBlank").addEventListener("change", updateFmtPreview);
$("fmtReset").addEventListener("click", () => {
  fieldsFromFormat(DEFAULT_FORMAT);
  updateFmtPreview();
});

$("settingsBtn").addEventListener("click", () => {
  $("emailInput").value = state.email || "";
  fieldsFromFormat(state.format);
  updateFmtPreview();
  $("settingsModal").classList.add("open");
});
$("settingsSave").addEventListener("click", () => {
  const fmt = formatFromFields();
  if (!fmt.line.trim()) { toast("Item line can't be empty"); return; }
  state.email = $("emailInput").value.trim();
  state.format = fmt;
  save();
  $("settingsModal").classList.remove("open");
  toast("Settings saved");
});
$("wipeBtn").addEventListener("click", () => {
  if (!confirm("Delete ALL locations, scans and settings?")) return;
  localStorage.removeItem(STORE_KEY);
  state = { locations: [], scans: {}, currentLoc: "", email: "", format: Object.assign({}, DEFAULT_FORMAT) };
  $("settingsModal").classList.remove("open");
  renderAll();
});

/* close modals when tapping the backdrop */
for (const id of ["qtyModal", "exportModal", "settingsModal"]) {
  $(id).addEventListener("click", e => { if (e.target === $(id)) $(id).classList.remove("open"); });
}

/* ---------- init ---------- */
load();
renderAll();
</script>
</body>
</html>
